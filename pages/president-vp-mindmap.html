.arrow.open{transform:rotate(90deg)}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 6px;border-radius:20px;font-size:13px;flex-wrap:wrap;line-height:1.5}

.b-key{background:rgba(79,163,247,.2);color:var(--blue)}
.b-warn{background:rgba(240,111,164,.2);color:var(--pink)}
.b-ok{background:rgba(62,207,142,.2);color:var(--green)}

.lt .pill{background:rgba(45,212,191,.1);border:0.5px solid var(--teal);color:var(--teal)}
.la .pill{background:rgba(255,124,58,.1);border:0.5px solid var(--orange);color:var(--orange)}

.lb .pill{background:rgba(79,163,247,.1);border:0.5px solid var(--blue);color:var(--blue)}
.lg .pill{background:rgba(62,207,142,.1);border:0.5px solid var(--green);color:var(--green)}
.lr .pill{background:rgba(245,200,66,.1);border:0.5px solid var(--gold);color:var(--gold)}

.l3 .pill{color:var(--muted);font-size:12px}
.hl .pill{background:rgba(245,200,66,.08)!important;border:1px solid var(--gold)!important}

mark{background:rgba(245,200,66,.3);border-radius:2px;color:var(--text)}

    arr.className='arrow';
    arr.textContent=d.ch&&d.ch.length?'▶':' ';
    if(d.o)arr.classList.add('open');
    const pill=document.createElement('span');
    pill.className='pill';
    const txt=document.createElement('span');
    txt.className='ntext';
    txt.textContent=d.l;
    pill.appendChild(txt);
    if(d.b){d.b.forEach(b=>{const s=document.createElement('span');s.className='badge '+b.s;s.textContent=b.t;pill.appendChild(s);});}
    row.appendChild(arr);row.appendChild(pill);
    li.appendChild(row);
    if(d.ch&&d.ch.length){
      const sub=document.createElement('ul');
      sub.className='children'+(d.o?'':' closed');
      build(d.ch,sub);
      li.appendChild(sub);
      row.addEventListener('click',()=>{
        const cl=sub.classList.contains('closed');
        sub.classList.toggle('closed',!cl);
        arr.classList.toggle('open',cl);
      });
    }
    ul.appendChild(li);
  });
}
function setAll(open){
  document.querySelectorAll('.children').forEach(e=>e.classList.toggle('closed',!open));
  document.querySelectorAll('.arrow').forEach(a=>{if(a.textContent!=' ')a.classList.toggle('open',open);});
}
function search(q){
  q=q.trim().toLowerCase();
  const rows=document.querySelectorAll('.row');
  if(!q){
    rows.forEach(r=>{r.classList.remove('hl','dim');const t=r.querySelector('.ntext');t.innerHTML=t.textContent;});
    return;
  }
  rows.forEach(r=>{
    const t=r.querySelector('.ntext');
    const raw=t.textContent;
    if(raw.toLowerCase().includes(q)){
      r.classList.add('hl');r.classList.remove('dim');
      const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
      t.innerHTML=raw.replace(re,'<mark>$1</mark>');
      let p=r.closest('.children');
      while(p){p.classList.remove('closed');const prev=p.previousElementSibling;if(prev){const a=prev.querySelector('.arrow');if(a)a.classList.add('open');}p=p.parentElement&&p.parentElement.closest('.children');}
    } else {
      r.classList.remove('hl');r.classList.add('dim');t.innerHTML=raw;
    }
  });
}
build(T,document.getElementById('root'));
</script>
